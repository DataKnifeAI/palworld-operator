name: Build

on:
  push:
  pull_request:

jobs:
  build:
    name: go build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go build
        run: go build -o bin/manager cmd/main.go
