apiVersion: palworld.dataknife.ai/v1alpha1
kind: PalworldServer
metadata:
  name: palworld-server
  namespace: game-servers
spec:
  # Official Pocketpair image (GHCR). Pin a version tag or digest in production.
  serverImage: ghcr.io/pocketpairjp/palserver:latest
  imagePullPolicy: IfNotPresent

  gateway:
    # Dedicated external IP (Kube-VIP / MetalLB), one per server.
    address: 192.168.14.187
    className: envoy

  serverName: DataKnife Palworld
  serverDescription: Operated by DataKnifeAI palworld-operator
  # Keep small for cluster nodes with ~8Gi allocatable.
  maxPlayers: 4
  multithreading: true

  gamePort: 8211
  queryPort: 27015

  rcon:
    enabled: true
    port: 25575

  restAPI:
    enabled: true
    port: 8212
    exposeViaGateway: false

  community:
    enabled: false

  updateOnBoot: true
  crossplayPlatforms: "(Steam,Xbox,PS5,Mac)"
  terminationGracePeriodSeconds: 60

  # Credentials — pick ONE mode:
  #
  # Mode A: bring-your-own Secret (create first, then reference keys):
  #   kubectl -n game-servers create secret generic palworld-server-secrets \
  #     --from-literal=admin-password='CHANGE_ME_ADMIN' \
  #     --from-literal=server-password='CHANGE_ME_JOIN'
  adminPasswordSecretRef:
    name: palworld-server-secrets
    key: admin-password
  serverPasswordSecretRef:
    name: palworld-server-secrets
    key: server-password
  #
  # Mode B: operator auto-generates an Opaque Secret ({metadata.name}-secrets)
  # with random server-password / admin-password. Omit the refs above and set:
  #   generateSecrets: true
  # Optional name override: credentialsSecretName: my-creds
  # Read passwords (never committed to git):
  #   kubectl get secret palworld-server-secrets -n game-servers \
  #     -o jsonpath='{.data.server-password}' | base64 -d; echo
  #   kubectl get secret palworld-server-secrets -n game-servers \
  #     -o jsonpath='{.data.admin-password}' | base64 -d; echo
  # Status surfaces credentialsSecretName / credentialsGenerated (no plaintext).

  storageSize: 50Gi
  storageClassName: truenas-csi-nfs

  # Explicit modest resources for ~8Gi worker nodes.
  resources:
    requests:
      cpu: "1"
      memory: 3Gi
    limits:
      cpu: "4"
      memory: 6Gi

  nodeSelector:
    kubernetes.io/os: linux
    kubernetes.io/arch: amd64
